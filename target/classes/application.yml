server:
  port: ${PORT:8080}

spring:
  application:
    name: voucherpro-backend
  config:
    import: optional:file:.env[.properties]
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/voucherpro}

app:
  jwt:
    secret: ${JWT_SECRET:voucherpro-dev-secret-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  admin:
    email: ${ADMIN_EMAIL:admin@voucherpro.com}
    password: ${ADMIN_PASSWORD:voucherpro-admin}
    name: ${ADMIN_NAME:VoucherPro Admin}
  payment:
    upi-id: ${UPI_ID:yourname@upi}
    merchant-name: ${UPI_NAME:VoucherPro}
